---
cluster:
  etcd:
    extraArgs:
      listen-metrics-urls: http://0.0.0.0:2381
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: etcd-metrics-ingress
portSelector:
  ports:
    - 2381
  protocol: tcp
ingress:
  # Same-node pod traffic arrives from the pod CIDR, while cross-node traffic is
  # SNATed to the source node IP by flannel on this cluster.
  - subnet: 10.244.0.0/16
  - subnet: 192.168.1.25/32
  - subnet: 192.168.1.26/32
  - subnet: 192.168.1.27/32
