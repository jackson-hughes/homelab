apiVersion: batch/v1
kind: CronJob
metadata:
  name: ping
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: ping
              image: curlimages/curl:latest
              command:
                - curl
                - -fsS
                - -m
                - "10"
                - --retry
                - "5"
                - -o
                - /dev/null
                - https://hc-ping.com/c5bdf3b6-bca7-4fb2-a038-ce7ddd2fca24
          restartPolicy: Never
