apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pushover-credentials
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: pushover-credentials
    creationPolicy: Owner
  data:
    - secretKey: vmalert_token
      remoteRef:
        key: Pushover/vmalert_token
    - secretKey: user_key
      remoteRef:
        key: Pushover/user_key
