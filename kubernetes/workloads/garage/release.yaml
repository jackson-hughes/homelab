apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
  namespace: garage
spec:
  releaseName: garage
  chart:
    spec:
      chart: script/helm/garage
      sourceRef:
        kind: GitRepository
        name: garage
  interval: 24h
  install:
    remediation:
      retries: 3
  values:
    garage:
      replicationFactor: "3"
      existingRpcSecret: "garage-rpc-secret"
      s3:
        api:
          region: "garage"
          rootDomain: ".s3.garage.tld"
    deployment:
      replicaCount: 3
      podManagementPolicy: Parallel
    persistence:
      meta:
        storageClass: "openebs-single-replica"
        size: "2Gi"
      data:
        storageClass: "openebs-single-replica"
        size: "32Gi"
    monitoring:
      metrics:
        enabled: true
        serviceMonitor:
          enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - garage
                - key: app.kubernetes.io/instance
                  operator: In
                  values:
                    - garage
            topologyKey: kubernetes.io/hostname
