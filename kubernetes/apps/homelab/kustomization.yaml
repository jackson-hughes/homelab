apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base/podinfo
  - ../base/prometheus-node-exporter
  - ../base/victoria-metrics
patches:
  - target:
      kind: HTTPRoute
      name: podinfo
    patch: |
      - op: replace
        path: /spec/hostnames/0
        value: podinfo.ducknet.io
