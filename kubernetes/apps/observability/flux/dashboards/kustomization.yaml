apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: victoria-metrics
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: flux-grafana-dashboards
    files:
      - cluster.json
      - control-plane.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: flux
        app.kubernetes.io/component: monitoring
