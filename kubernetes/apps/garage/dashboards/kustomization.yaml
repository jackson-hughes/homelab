apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: victoria-metrics
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: garage-grafana-dashboards
    files:
      - garage.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: garage
        app.kubernetes.io/component: monitoring
