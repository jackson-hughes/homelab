apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: victoria-metrics-query-auth
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: victoria-metrics-query-auth
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: victoria-metrics-query-auth/username
    - secretKey: password
      remoteRef:
        key: victoria-metrics-query-auth/password
