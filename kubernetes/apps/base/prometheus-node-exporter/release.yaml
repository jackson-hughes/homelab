apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-node-exporter
  namespace: node-exporter
spec:
  releaseName: node-exporter
  chart:
    spec:
      chart: prometheus-node-exporter
      version: "^4.52.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  interval: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    prometheus:
      monitor:
        enabled: true
        additionalLabels:
          release: monitoring
