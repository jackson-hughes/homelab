apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  releaseName: monitoring
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "^82.10.3"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  interval: 10m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    grafana:
      enabled: true
      admin:
        existingSecret: grafana-admin-credentials
        userKey: admin-user
        passwordKey: admin-password
      deploymentStrategy:
        type: Recreate
      ingress:
        enabled: false
      persistence:
        enabled: true
        type: pvc
        accessModes:
          - ReadWriteOnce
        storageClassName: mayastor-3
        size: 20Gi
      grafana.ini:
        server:
          domain: grafana.ducknet.io
          root_url: https://grafana.ducknet.io
    alertmanager:
      enabled: true
      ingress:
        enabled: false
      alertmanagerSpec:
        externalUrl: https://alerts.ducknet.io
        replicas: 1
        storage:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              storageClassName: mayastor-3
              resources:
                requests:
                  storage: 10Gi
    prometheus:
      enabled: true
      ingress:
        enabled: false
      prometheusSpec:
        externalUrl: https://prometheus.ducknet.io
        replicas: 1
        retention: 30d
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              storageClassName: mayastor-3
              resources:
                requests:
                  storage: 100Gi
    prometheus-node-exporter:
      enabled: false
    kube-state-metrics:
      enabled: true
    defaultRules:
      create: true
