apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm-operator
  namespace: victoria-metrics
spec:
  releaseName: vm-operator
  chart:
    spec:
      chart: victoria-metrics-operator
      version: "0.59.3"
      sourceRef:
        kind: HelmRepository
        name: vm-operator
  interval: 24h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    crds:
      plain: true
    serviceMonitor:
      enabled: false
    operator:
      disable_prometheus_converter: true
