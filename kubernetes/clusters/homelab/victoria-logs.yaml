---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vl
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: vm
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/homelab/victoria-logs
  prune: true
  wait: true
  timeout: 5m0s
