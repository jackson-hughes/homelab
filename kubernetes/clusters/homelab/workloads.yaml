---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: workloads
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  dependsOn:
    - name: infra-config
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/workloads
  prune: true
  wait: true
  timeout: 5m0s
